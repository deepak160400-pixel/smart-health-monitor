<!DOCTYPE html>

<html>

<head>

<link
rel="stylesheet"
href="{{url_for('static',filename='style.css')}}">

</head>

<body>

<div class="container">

<div class="left">

<h1>

SMART HEALTH

</h1>

<p>

AI Thermal Healthcare

</p>

</div>


<div class="right">

<div class="card">

{% if error %}
<p class="error">

{{error}}

</p>
{% endif %}

{% if success %}
<p class="success">

{{success}}

</p>
{% endif %}


<div id="login">

<h2>

Login

</h2>

<form
action="/login"
method="POST">

<input
name="email"
type="email"
placeholder="Email"
required>

<input
name="password"
type="password"
placeholder="Password"
required>

<button>

LOGIN

</button>

</form>

<p>

No account?

<a
onclick="showRegister()">

Register

</a>

</p>

</div>


<div
id="register"

style="display:none">

<h2>

Register

</h2>

<form
action="/register"
method="POST">

<input
name="email"
type="email"
required
placeholder="Email">

<input
name="phone"
pattern="[6789][0-9]{9}"
required
placeholder="Phone">

<input
name="password"
type="password"
required
placeholder="Password">

<button>

REGISTER

</button>

</form>

<p>

<a
onclick="showLogin()">

Back to Login

</a>

</p>

</div>

</div>

</div>

</div>


<script>

function showRegister(){

document
.getElementById(
"login"
)

.style.display=

"none"

document
.getElementById(
"register"
)

.style.display=

"block"

}


function showLogin(){

document
.getElementById(
"login"
)

.style.display=

"block"

document
.getElementById(
"register"
)

.style.display=

"none"

}

</script>

</body>

</html>
